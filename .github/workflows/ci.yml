name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --all-targets --locked
      - run: cargo package --locked -p chuda
      - run: python -m pip install maturin pytest
      - run: maturin develop --release
      - run: pytest python/tests

  cuda-compile:
    runs-on: ubuntu-latest
    container: nvidia/cuda:12.8.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust prerequisites
        run: apt-get update -q && apt-get install -y -q curl ca-certificates gcc g++
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --locked --features cuda
